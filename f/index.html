<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cacau Show | Problema no Pagamento</title>
    <link rel="icon" href="/favicon.png?v=2">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { margin: 0; font-family: 'Montserrat', sans-serif; background-color: #f4f0ea; color: #130407; }
        
        /* Cabeçalho Preto Oficial */
        .navbar { width: 100%; background: #121212; padding: 15px 40px; display: flex; align-items: center; justify-content: space-between; box-sizing: border-box; }
        .navbar img { height: 35px; }
        .navbar .icons { color: white; font-size: 20px; display: flex; gap: 20px; }

        /* Container Principal */
        .main-content { display: flex; align-items: center; justify-content: center; min-height: 90vh; padding: 20px; }
        
        .error-card { 
            background: white; 
            padding: 0; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            max-width: 450px; 
            width: 100%; 
            overflow: hidden; 
            text-align: center;
        }

        .error-card img { width: 100%; height: auto; display: block; }

        .text-section { padding: 30px; }
        
        h1 { color: #b92a2a; font-size: 22px; margin-bottom: 10px; font-weight: 800; }
        p { color: #444; font-size: 15px; line-height: 1.6; margin-bottom: 25px; }
        
        .btn-retry { 
            background-color: #5a8f4d; 
            color: white; 
            text-decoration: none; 
            padding: 18px; 
            border-radius: 10px; 
            font-weight: bold; 
            display: block; 
            font-size: 16px;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .btn-retry:hover { background-color: #4c7b41; transform: scale(1.02); }
    </style>
</head>
<body>

    <header class="navbar">
        <img src="/logo.png" alt="Cacau Show">
        <div class="icons">
            <i class="bi bi-person"></i>
            <i class="bi bi-cart3"></i>
        </div>
    </header>

    <main class="main-content">
        <div class="error-card">
            <!-- Imagem do Coelho que você subiu -->
            <img src="/erro-pagamento.png?v=1" alt="Pagamento Recusado">
            
            <div class="text-section">
                <h1>PAGAMENTO RECUSADO</h1>
                <p>Ocorreu um erro no processamento dos seus dados. Mas não se preocupe, sua <b>Promoção de Páscoa</b> ainda está garantida!<br><br>Tente novamente pelo nosso <b>canal de contingência</b> clicando no botão abaixo.</p>
                
                <a href="/comprarf" class="btn-retry">Tentar Novamente Agora</a>
            </div>
        </div>
    </main>

</body>
</html>
