<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cacau Show | Problema no Pagamento</title>
    <link rel="icon" href="/favicon.png?v=2">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { margin: 0; font-family: sans-serif; background-color: #f4f0ea; color: #130407; }
        
        /* Cabeçalho igual ao seu site principal */
        .header-preto {
            width: 100%;
            background: #121212;
            padding: 15px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-sizing: border-box;
        }
        .header-preto img { height: 35px; }
        .header-preto .icons { color: white; font-size: 22px; display: flex; gap: 20px; }

        /* Conteúdo centralizado */
        .main-container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 80vh;
            padding: 20px;
        }
        .error-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            max-width: 450px;
            width: 100%;
            text-align: center;
        }
        .error-icon { font-size: 65px; color: #b92a2a; margin-bottom: 20px; }
        h1 { font-size: 22px; font-weight: bold; margin-bottom: 15px; }
        p { color: #555; font-size: 15px; line-height: 1.6; margin-bottom: 30px; }
        
        .btn-comprar {
            background-color: #5a8f4d;
            color: white;
            text-decoration: none;
            padding: 18px;
            border-radius: 6px;
            font-weight: bold;
            display: block;
            text-transform: uppercase;
            transition: background 0.3s;
        }
        .btn-comprar:hover { background-color: #4c7b41; }
    </style>
</head>
<body>

    <header class="header-preto">
        <img src="/logo.png" alt="Cacau Show">
        <div class="icons">
            <i class="bi bi-person"></i>
            <i class="bi bi-cart3"></i>
        </div>
    </header>

    <div class="main-container">
        <div class="error-card">
            <i class="bi bi-exclamation-octagon-fill error-icon"></i>
            <h1>Ops! Pagamento Não Processado</h1>
            <p>Não conseguimos completar sua transação devido a uma instabilidade momentânea na rede bancária. <br><br>Para garantir seu produto com o valor promocional, tente novamente pelo nosso canal de segurança secundário.</p>
            
            <!-- Link para o segundo checkout mascarado -->
            <a href="/comprarf" class="btn-comprar">Tentar Novamente agora</a>
        </div>
    </div>

</body>
</html>
